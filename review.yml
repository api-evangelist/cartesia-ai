aid: cartesia-ai
name: Cartesia
review:
  question: Does Cartesia expose a documented public WebSocket API?
  answer: true
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: true
  asyncapiScopeNote: |
    Cartesia is one of the few providers in this catalog with a real,
    documented, bidirectional WebSocket protocol - not Server-Sent Events
    dressed up as "streaming." An AsyncAPI 2.6 document was created at
    asyncapi/cartesia-ai-asyncapi.yml modeling both the TTS WebSocket
    (wss://api.cartesia.ai/tts/websocket) and the STT WebSocket
    (wss://api.cartesia.ai/stt/websocket), including full request/response
    message schemas taken directly from Cartesia's published documentation.
findings:
  summary: |
    Cartesia publishes a documented, production WebSocket API for its two
    core realtime audio surfaces:

    - Text-to-Speech WebSocket at wss://api.cartesia.ai/tts/websocket
      (docs.cartesia.ai/api-reference/tts/websocket): a bidirectional,
      multiplexed connection. Clients send JSON generation requests keyed by
      a context_id (continuing a context preserves prosody across chunks of
      transcript) and receive base64-encoded audio "chunk" messages, optional
      word/phoneme "timestamps" messages, "flush_done" acknowledgements, a
      terminal "done" message, and "error" messages. A cancel message
      (context_id + cancel:true) stops an in-flight context. A single
      connection is documented to scale to "dozens of concurrent
      generations."
    - Speech-to-Text WebSocket at wss://api.cartesia.ai/stt/websocket
      (docs.cartesia.ai/api-reference/stt/websocket): clients stream binary
      audio frames (100ms chunks recommended) matching connection-level
      encoding/sample_rate query parameters, and send text commands
      (finalize, close) to control finalization. The server returns
      "transcript" messages with an is_final flag and word-level timing,
      plus flush_done/done/error control messages. A companion endpoint at
      wss://api.cartesia.ai/stt/turns/websocket
      (docs.cartesia.ai/api-reference/stt/turns/websocket) adds built-in
      turn detection so finalize is not required.

    Both endpoints authenticate via an X-API-Key header or an access_token
    query parameter (the latter for browser clients that cannot set custom
    WebSocket headers), plus a required cartesia_version query parameter.
    This is a materially different, and stronger, real-time transport story
    than the HTTP Server-Sent Events streaming most competing voice-AI and
    LLM providers document.
  transports:
    - protocol: WebSocket
      scheme: wss
      baseURL: wss://api.cartesia.ai/tts/websocket
      documented: true
      note: Bidirectional, multiplexed realtime TTS generation with context_id-scoped requests/responses, timestamps, flush, and cancel.
    - protocol: WebSocket
      scheme: wss
      baseURL: wss://api.cartesia.ai/stt/websocket
      documented: true
      note: Realtime STT with manual finalize/close commands and word-level transcript timing.
    - protocol: WebSocket
      scheme: wss
      baseURL: wss://api.cartesia.ai/stt/turns/websocket
      documented: true
      note: Same STT protocol with built-in server-side turn detection; not separately channeled in the AsyncAPI document but noted as a variant.
    - protocol: REST
      scheme: https
      baseURL: https://api.cartesia.ai
      documented: true
      note: Single-shot bytes and Server-Sent Events surfaces for TTS, STT, Voice Changer, Infill, Voices, Datasets, Pronunciation Dictionaries, API Keys, Auth, Voice Agents, and Usage.
    - protocol: SSE
      scheme: https
      documented: true
      note: One-way HTTP Server-Sent Events at POST /tts/sse and POST /voice-changer/sse, delivered over the same REST base. Modeled in the OpenAPI document, not the AsyncAPI document, since it is not WebSocket.
