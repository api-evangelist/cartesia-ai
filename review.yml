actions:
  asyncapiPath: asyncapi/cartesia-ai-asyncapi.yml
  apisYmlUpdated: true
  reason: |
    A real, documented, bidirectional WebSocket protocol exists for both TTS
    and STT. Under the standing scope for this catalog, a confirmed
    WebSocket surface is modeled in AsyncAPI; the message schemas for
    generation requests, cancel, audio chunks, timestamps, flush, done, and
    error are taken directly from Cartesia's published api-reference pages
    rather than inferred.
