    - WSS wss://api.cartesia.ai/tts/websocket
    - WSS wss://api.cartesia.ai/stt/websocket
    - WSS wss://api.cartesia.ai/stt/turns/websocket
  endpointsModeled: |
    The full 57-path OpenAPI document (openapi/cartesia-ai-openapi.yml)
    includes the Voice Agents platform surface (calls, call-batches, phone
    numbers, providers, webhooks, deployments, knowledge base
    documents/folders, and metrics) and Pronunciation Dictionaries with
    request/response shapes reconstructed from Cartesia's published
    api-reference pages listed in llms.txt; the request/response bodies for
    the less-documented long-tail agent-platform endpoints (e.g. exact
    Document/Folder/Metric fields) are modeled schematically from the
    reference summaries rather than a fully expanded field-by-field page
    fetch of every one of the ~90 agent-platform reference pages.
