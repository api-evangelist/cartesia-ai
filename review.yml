    - GET  https://api.cartesia.ai/datasets
    - POST https://api.cartesia.ai/datasets/
    - GET  https://api.cartesia.ai/datasets/{id}
    - POST https://api.cartesia.ai/datasets/{id}/files
    - GET  https://api.cartesia.ai/api-keys
    - GET  https://api.cartesia.ai/api-keys/{id}
