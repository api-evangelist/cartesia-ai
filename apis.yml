- aid: cartesia-ai:cartesia-ai-voice-agents-api
  name: Cartesia Voice Agents API
  tags:
  - Voice Agents
  - Telephony
  - Calls
  - Knowledge Base
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.cartesia.ai/api-reference/agents/agents/list
  baseURL: https://api.cartesia.ai
  properties:
  - url: https://docs.cartesia.ai/api-reference/agents/agents/list
    type: APIReference
  - url: openapi/cartesia-ai-openapi.yml
    type: OpenAPI
  description: Build and operate voice agents end to end - manage agents and
    public templates; place, list, cancel, and batch outbound calls and
    download call audio and logs; import, provision, and manage telephony
    phone numbers and provider accounts; register webhooks; inspect
    deployments; and maintain a knowledge base of documents and folders plus
    LLM-as-a-judge metrics used to evaluate agent quality.
