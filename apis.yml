  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.cartesia.ai/api-reference/pronunciation-dicts/list
  baseURL: https://api.cartesia.ai
  properties:
  - url: https://docs.cartesia.ai/api-reference/pronunciation-dicts/list
