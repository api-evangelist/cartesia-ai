meters:
- name: tts_credits
  description: Credits consumed by Text-to-Speech generation (REST bytes/SSE and WebSocket), drawn from the plan's monthly credit pool.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - model
  - api
- name: stt_credits
  description: Credits consumed by Speech-to-Text transcription (batch REST and WebSocket), drawn from the plan's monthly credit pool.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - model
  - api
- name: agent_call_minutes
  description: Voice Agent call minutes billed against the prepaid agents balance at $0.06/minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - agent
- name: telephony_minutes
  description: Cartesia-managed telephony number minutes billed at $0.014/minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - phone_number
- name: voice_clone_operations
  description: One-time professional voice cloning operations billed at 225 credits each.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - voice
- name: dataset_storage
  description: Files and audio stored in Datasets for fine-tuning and voice creation.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - dataset
principles:
- name: Visibility
  description: Pull credit and agent usage via GET /usage/credits and GET /usage/agents, bucketed by interval, and monitor concurrency utilization against plan ceilings.
- name: Allocation
  description: Scope API keys and access tokens per workload/team/agent; tag calls and phone numbers by agent_id to map spend to internal cost centers.
- name: Optimization
  description: Reuse a single TTS/STT WebSocket connection across many context_id generations instead of opening one connection per request; batch outbound calls; choose REST bytes over SSE/WebSocket for non-realtime one-shot synthesis to simplify billing review.
- name: Accountability
  description: Assign an owner per agent and per API key; review monthly credit burn and prepaid agents balance against plan allowances, upgrading tiers before hitting concurrency ceilings.
