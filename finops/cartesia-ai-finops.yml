description: >-
  FinOps view of Cartesia spend. Cartesia bills a monthly subscription per
  tier (Free/Pro/Startup/Scale/Enterprise) that includes a pooled monthly
  credit allowance consumed by TTS and STT generation, plus a separate
  prepaid Voice Agents balance metered per minute for calls and telephony
  and a one-time credit charge for professional voice cloning. Concurrency
  ceilings rather than per-request rate limits are the operative capacity
  constraint, so cost and throughput scale together per plan.
notes: >-
  Cartesia does not publish a flat credits-to-dollars or
  credits-per-character conversion table; verify current per-model/per-
  feature credit burn rates in the dashboard during reconciliation. Agent
  usage rates ($0.06/min calls, $0.014/min telephony) and the 225-credit
  professional voice cloning fee are as published on the pricing page.
