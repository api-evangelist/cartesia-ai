  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Subscription
  - Adjustment
focusColumns:
  ServiceName: Cartesia
  ServiceCategory: AI and Machine Learning
